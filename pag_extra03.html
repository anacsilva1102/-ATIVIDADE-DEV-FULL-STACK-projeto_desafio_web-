<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro site</title>

    <link rel="stylesheet" href="css/style.css">


    <script src="js/scripts_extra03.js" defer></script>
</head>

<body>

    <h1>Um comerciante calcula o valor da venda dos produtos de seu estabelecimento tendo em vista uma tabela de lucros. Elabore um algoritmo que possa entrar com o nome do produto e valor da compra e imprima o nome do produto e o valor da venda.</h1>

    <div id="div-form">
        <h3> Calcular Valor de Venda</h3>

        <form id="formulario-pessoal">
            <label for="nome">Nome do Produto</label>
            <input type="text" name="nome" id="nome" required>

            <label for="valor_compra">Valor da Compra (R$)</label>
            <input type="number" step="0.01" name="valor_compra" id="valor_compra" required>

            
            <button type="submit"> Enviar </button>
            <button type="reset"> Limpar </button>
        </form>

        <div id="div-dados">


        </div>


    </div>

</body>

</html>
