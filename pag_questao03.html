<body>

    <h1>Calcular a quantidade de combustível e o valor total a pagar.</h1>

    <div id="div-form">
        <h3> Dados da Viagem </h3>

        <form id="formulario-pessoal">
            <label for="distancia">Distância (em km)</label>
            <input type="text" name="distancia" id="distancia">

            <label for="consumo">Consumo médio (em km/l)</label>
            <input type="text" name="consumo" id="consumo">

            <label for="preco">Preço do combustível (R$)</label>
            <input type="text" name="preco" id="preco">

            <button type="submit"> Enviar </button>
            <button type="reset"> Limpar </button>
        </form>

        <div id="div-dados">


        </div>


    </div>
